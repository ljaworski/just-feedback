name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - 20
          - 22
          - 24
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run clean
      - run: npm run build

  packages:
    name: Published package smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run verify:packages
      - run: npm run smoke:packages

  docker:
    name: Docker smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Build image
        run: docker build --tag just-feedback:test .
      - name: Start and verify image
        run: |
          docker volume create just-feedback-test-data
          docker run --detach --name just-feedback-test --publish 4180:4180 --volume just-feedback-test-data:/data just-feedback:test
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:4180/healthz; then
              break
            fi
            if [ "$attempt" = 30 ]; then
              docker logs just-feedback-test
              exit 1
            fi
            sleep 1
          done
          docker restart just-feedback-test
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:4180/healthz; then
              exit 0
            fi
            sleep 1
          done
          docker logs just-feedback-test
          exit 1
      - name: Clean up image test
        if: always()
        run: |
          docker rm --force just-feedback-test || true
          docker volume rm just-feedback-test-data || true

